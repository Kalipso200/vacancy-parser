# ========== SERVER ==========
server.port=8080

# ========== THREAD POOLS ==========
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.enabled=true
# DataSource
spring.datasource.url=jdbc:h2:mem:vacancydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ========== JPA ==========
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ========== WEB ==========
spring.web.resources.add-mappings=true
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/


# ========== HH.RU API ==========
hh.api.base-url=https://api.hh.ru
hh.api.user-agent=VacancyParser-test

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.show-actuator=true
springdoc.packages-to-scan=com.example.vacancyparser.controller
springdoc.paths-to-match=/api/**,/**
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.enable-validator=true

# ????????? CORS ??? Swagger UI
springdoc.api-docs.enabled=true

# ========== LOGGING ==========
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.level.com.example.vacancyparser=DEBUG
logging.level.org.springframework.web=INFO

logging.file.name=logs/vacancy-parser.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ========== SPRING BOOT ACTUATOR CONFIGURATION ==========
management.endpoints.web.exposure.include=health,info,metrics,prometheus,threaddump,heapdump,httptrace
management.endpoints.web.base-path=/actuator

# Health details
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

management.metrics.web.server.request.autotime.enabled=true
management.metrics.web.server.request.percentiles=0.5,0.95,0.99
management.metrics.web.server.request.slo=10ms,50ms,100ms,200ms,500ms,1s,2s

management.metrics.enable.executor=true

management.metrics.tags.application=vacancy-parser
management.metrics.tags.environment=production

# ========== INFO ==========
info.application.name=Vacancy Parser API
info.application.description=Multithreaded vacancy parser with Spring Boot and Prometheus
info.application.version=1.0.0